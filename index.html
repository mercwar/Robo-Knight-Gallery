<script>
window.addEventListener("load", () => {
    const anchor = document.getElementById("jump_scroll");
    if (!anchor) return;

    // 1. Scroll to anchor
    anchor.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });

    // 2. Track scroll until it stops moving
    let lastPos = -1;
    let sameCount = 0;

    function trackScroll() {
        const currentPos = window.scrollY;

        // If scroll position hasn't changed for 3 checks → scrolling is done
        if (currentPos === lastPos) {
            sameCount++;
            if (sameCount >= 3) {
                // 3. Now scroll further down
                window.scrollBy({
                    top: 140,
                    behavior: "smooth"
                });
                return; // stop tracking
            }
        } else {
            sameCount = 0; // reset if movement detected
        }

        lastPos = currentPos;
        requestAnimationFrame(trackScroll);
    }

    requestAnimationFrame(trackScroll);
});
</script>
